arch: amd64
os: linux
dist: xenial

# cache:
#   bundler: true
#   directories:
#     - /opt/oracle

addons:
  apt:
    packages:
      - libyazpp-dev
      - unzip

language: ruby
sudo: false
cache:
  bundler: true

rvm:
  - 2.6.4

env:
  global:
    - NOKOGIRI_USE_SYSTEM_LIBRARIES=true

before_install:
  - "echo 'gem: --no-document' > ~/.gemrc"
  - gem update --system 3.0.6
  - gem install bundler
  # Install oracle dependency for ruby-oci8 gem
  - [ ! -d /opt/oracle/instantclient_21_1 ] && mkdir -p /opt/oracle
  - [ ! -d /opt/oracle/instantclient_21_1 ] && cd /opt/oracle
  - ls -la /opt/oracle
  - [ ! -d /opt/oracle/instantclient_21_1 ] && curl -O 'https://download.oracle.com/otn_software/linux/instantclient/211000/instantclient-basic-linux.x64-21.1.0.0.0.zip'
  - [ ! -d /opt/oracle/instantclient_21_1 ] && curl -O 'https://download.oracle.com/otn_software/linux/instantclient/211000/instantclient-sdk-linux.x64-21.1.0.0.0.zip'
  - [ ! -d /opt/oracle/instantclient_21_1 ] && curl -O 'https://download.oracle.com/otn_software/linux/instantclient/211000/instantclient-sqlplus-linux.x64-21.1.0.0.0.zip'
  - [ ! -d /opt/oracle/instantclient_21_1 ] && find . -name '*.zip' -exec unzip {} \; -exec rm {} \;
  - [ ! -d /opt/oracle/instantclient_21_1 ] && export LD_LIBRARY_PATH=/opt/oracle/instantclient_21_1
  - [ ! -d /opt/oracle/instantclient_21_1 ] && cd $TRAVIS_BUILD_DIR

before_script:
  - cp config/templates/hysync.template.yml config/hysync.yml
  - cp config/templates/hyacinth.template.yml config/hyacinth.yml
  - cp config/templates/voyager.template.yml config/voyager.yml
  - cp config/templates/database.template.yml config/database.yml
